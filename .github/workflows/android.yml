name: Build Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "::set-output name=VERSION::$VERSION"
          echo "APK_NAME=photo-advisor-$VERSION.apk"

      - run: npx expo prebuild --platform android --clean

      - name: Build APK
        run: cd android && ./gradlew assembleRelease

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk /tmp/photo-advisor-${{ steps.version.outputs.VERSION }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            拍摄参谋 v${{ steps.version.outputs.VERSION }}
            - 自动构建发布
          draft: false
          prerelease: false
          files: |
            /tmp/photo-advisor-${{ steps.version.outputs.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
